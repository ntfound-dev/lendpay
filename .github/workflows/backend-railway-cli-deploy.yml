name: Backend Railway CLI Deploy

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "railway.json"
      - "backend-go/**"
      - "deploy/railway/backend/**"
      - "deploy/railway/deploy/**"
      - ".github/workflows/backend-railway-cli-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-railway-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RAILWAY_PROJECT_ID: 7050bf95-66d8-41d7-a92e-02982de02c14
      RAILWAY_ENVIRONMENT: backend
      RAILWAY_SERVICE: balanced-peace
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.38.0

      - name: Prepare backend deploy root
        run: |
          set -euo pipefail

          deploy_root="$(mktemp -d)"
          mkdir -p "$deploy_root/deploy/railway"
          cp -R backend-go "$deploy_root/"
          cp -R deploy/railway/backend "$deploy_root/deploy/railway/"
          cp -R deploy/railway/deploy "$deploy_root/deploy/railway/"

          echo "DEPLOY_ROOT=$deploy_root" >> "$GITHUB_ENV"

      - name: Deploy backend to Railway
        working-directory: ${{ env.DEPLOY_ROOT }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail

          railway up \
            -s "$RAILWAY_SERVICE" \
            -e "$RAILWAY_ENVIRONMENT" \
            -p "$RAILWAY_PROJECT_ID" \
            -c \
            -m "github actions backend deploy ${GITHUB_SHA::7}"

  missing-token:
    if: ${{ secrets.RAILWAY_TOKEN == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain missing secret
        run: |
          echo "GitHub secret RAILWAY_TOKEN is missing."
          echo "Add it in repo settings to enable automatic Railway CLI deploys on push."
