name: lendpay-local-stack

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lendpay_dev
    ports:
      - "55432:5432"
    volumes:
      - lendpay_local_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lendpay_dev"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  lendpay_local_postgres:
